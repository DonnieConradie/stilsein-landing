<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StilSein | Data Sonder Grense</title>
    <style>
        body {
            background-color: #1A1F26;
            color: #E4E8EC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* THE STATIC LOGO */
        .wolf-logo {
            width: 200px; 
            height: auto;
            margin-bottom: 20px;
            /* Subtle glow to match the app aesthetic */
            filter: drop-shadow(0 0 15px rgba(145, 172, 200, 0.2));
        }

        h1 {
            letter-spacing: 8px;
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
        }
        h1 span {
            color: #91ACC8; /* StilSein Blue */
        }
        .status-tag {
            background-color: rgba(145, 172, 200, 0.1);
            border: 1px solid rgba(145, 172, 200, 0.3);
            color: #91ACC8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 15px;
            text-transform: uppercase;
        }
        p {
            color: #ADBAB7;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 25px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <img src="wolf_white.png" alt="StilSein Wolf" class="wolf-logo">
    
    <h1>STIL<span>SEIN</span></h1>
    <div class="status-tag">In Ontwikkeling</div>
    
    <p>BIETJIE GEDULD...<br>Ons bou tans die toekoms van die veld.</p>

</body>
</html>
