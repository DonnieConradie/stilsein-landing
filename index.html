<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StilSein | Data Sonder Grense</title>
    <style>
        body {
            background-color: #1A1F26;
            color: #E4E8EC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* THE ANIMATED WOLF */
        .wolf-container {
            width: 250px; 
            height: 242px; /* Precision adjustment */
            background-image: url('wolf_strip.png');
            background-repeat: no-repeat;
            
            /* background-size: width, total-strip-height */
            /* Math: 242px per frame * 31 frames = 7502px */
            background-size: 250px 7502px; 
            
            /* THE KINETICS: 31 frames over 7.5 seconds */
            /* We use 'steps(31)' to ensure each line-trace 'snaps' in */
            animation: assemble-wolf 7.5s steps(31) infinite;
            
            margin: 0 auto 20px auto;
            filter: drop-shadow(0 0 15px rgba(145, 172, 200, 0.3));
        }

        @keyframes assemble-wolf {
            from { background-position: 0 0; }
            to { background-position: 0 -7502px; } /* Must match background-size height */
        }

        h1 {
            letter-spacing: 8px;
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
        }
        h1 span {
            color: #91ACC8; /* StilSein Blue */
        }
        .status-tag {
            background-color: rgba(145, 172, 200, 0.1);
            border: 1px solid rgba(145, 172, 200, 0.3);
            color: #91ACC8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 15px;
            text-transform: uppercase;
        }
        p {
            color: #ADBAB7;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="wolf-container"></div>
    
    <h1>STIL<span>SEIN</span></h1>
    <div class="status-tag">System Initialization</div>
    
    <p>BIETJIE GEDULD...<br>Ons bou tans die toekoms van die veld.</p>

</body>
</html>
