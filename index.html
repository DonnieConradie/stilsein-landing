<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StilSein | Data Sonder Grense</title>
    <style>
        body {
            background-color: #1A1F26;
            color: #E4E8EC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* THE ANIMATION CONTAINER - Sized like your App Squircle */
        .wolf-box {
            width: 320px;
            height: 320px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .wolf-sprite {
            width: 100%;
            height: 100%;
            background: url('wolf_strip.png') no-repeat;
            background-size: 100% auto;
            
            /* THE REFINED ENGINE: 
               4s for a deliberate assembly, 
               8s for a slow, professional breath */
            animation: 
                move-wolf 4s steps(31) infinite,
                breath-wolf 8s ease-in-out infinite;
            
            /* Clean, steady StilSein Blue glow */
            filter: drop-shadow(0 0 8px rgba(145, 172, 200, 0.4));
        }

        /* 31 frames: 0% to 100% position */
        @keyframes move-wolf {
            from { background-position: 0 0; }
            to { background-position: 0 -9920px; } /* (31 * 320px) */
        }

        /* Subtle breathing instead of flickering */
        @keyframes breath-wolf {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        h1 {
            letter-spacing: 10px;
            font-size: 2.2rem;
            margin: 0;
            font-weight: bold;
            opacity: 0.9;
        }
        span { color: #91ACC8; }

        p {
            color: #ADBAB7;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="wolf-box">
        <div class="wolf-sprite"></div>
    </div>
    <h1>STIL<span>SEIN</span></h1>
    <p>BIETJIE GEDULD...<br>Ons bou tans die toekoms van die veld.</p>
</body>
</html>
